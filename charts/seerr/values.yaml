# Default values for seerr

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/seerr-team/seerr
  tag: "v3.0.1"
  pullPolicy: IfNotPresent

env:
  PUID: "999"
  PGID: "999"
  TZ: "Etc/UTC"

# Database configuration (Seerr 3.0+ supports PostgreSQL)
database:
  type: "sqlite" # or "postgres"
  # Optional: For PostgreSQL
  postgres:
    host: ""
    port: 5432
    user: ""
    password: ""
    database: "seerr"
    existingSecret: ""
    passwordKey: "password"

service:
  type: ClusterIP
  port: 5055

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: seerr.local
  tls:
    enabled: false
    secretName: seerr-tls

persistence:
  config:
    enabled: true
    size: 1Gi
    storageClass: ""
    existingClaim: ""

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /api/v1/status
    port: 5055
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/status
    port: 5055
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /api/v1/status
    port: 5055
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 15

nodeSelector: {}
tolerations: []
affinity: {}
